name: Cog HA-Matter Release

# Validate and cross-build the Home Assistant + Matter integration on version
# tags. Manual runs retain downloadable workflow artifacts; tag runs also
# publish the same checksummed assets to a standard GitHub Release.

on:
  push:
    tags:
      - 'cog-ha-matter-v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CRATE: cog-ha-matter

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v2/target
          key: cog-ha-matter-validate-${{ hashFiles('v2/Cargo.lock') }}

      - name: Run library tests
        working-directory: v2
        run: cargo test -p cog-ha-matter --no-default-features --lib

      - name: Check release package
        working-directory: v2
        run: cargo check -p cog-ha-matter --no-default-features

  build-x86_64:
    name: Build x86_64
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v2/target
          key: cog-ha-matter-x86_64-${{ hashFiles('v2/Cargo.lock') }}

      - name: Build release binary
        working-directory: v2/crates/cog-ha-matter/cog
        run: make build-x86_64

      - name: Compute checksum and optional signature
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        working-directory: v2/crates/cog-ha-matter/cog
        run: make sign-x86_64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cog-ha-matter-x86_64
          path: |
            v2/crates/cog-ha-matter/cog/dist/cog-ha-matter-x86_64
            v2/crates/cog-ha-matter/cog/dist/cog-ha-matter-x86_64.sha256
            v2/crates/cog-ha-matter/cog/dist/cog-ha-matter-x86_64.sig
          if-no-files-found: warn
          retention-days: 14

  build-arm:
    name: Build aarch64 (arm)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v2/target
          key: cog-ha-matter-arm-${{ hashFiles('v2/Cargo.lock') }}

      - name: Build release binary
        working-directory: v2
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build -p cog-ha-matter --release --target aarch64-unknown-linux-gnu
          mkdir -p crates/cog-ha-matter/cog/dist
          cp target/aarch64-unknown-linux-gnu/release/cog-ha-matter \
             crates/cog-ha-matter/cog/dist/cog-ha-matter-arm

      - name: Compute checksum and optional signature
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        working-directory: v2/crates/cog-ha-matter/cog
        run: make sign-arm

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cog-ha-matter-arm
          path: |
            v2/crates/cog-ha-matter/cog/dist/cog-ha-matter-arm
            v2/crates/cog-ha-matter/cog/dist/cog-ha-matter-arm.sha256
            v2/crates/cog-ha-matter/cog/dist/cog-ha-matter-arm.sig
          if-no-files-found: warn
          retention-days: 14

  publish-github-release:
    name: Publish GitHub Release
    needs: [build-x86_64, build-arm]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/cog-ha-matter-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release checksums
        run: |
          set -euo pipefail
          cd release-assets
          for checksum in *.sha256; do
            binary="${checksum%.sha256}"
            printf '%s  %s\n' "$(cat "$checksum")" "$binary" | sha256sum --check -
          done

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          title="cog-ha-matter ${tag#cog-ha-matter-v}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --verify-tag \
              --title "$title" \
              --generate-notes
          fi
